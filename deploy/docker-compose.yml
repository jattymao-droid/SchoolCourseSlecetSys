version: '3.8'

services:
  # 后端服务
  backend:
    image: course-selection-backend:latest
    container_name: course-selection-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./upload:/app/upload
    depends_on:
      - postgres
      - redis
    networks:
      - course-network

  # 前端服务 (Nginx)
  frontend:
    image: nginx:alpine
    container_name: course-selection-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - course-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:13-alpine
    container_name: course-selection-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=school-course
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mm5621528
      - TZ=Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - course-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: course-selection-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - course-network

networks:
  course-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
