# Nginx配置文件 - 学校选课系统
# 用于宝塔面板配置
# 域名: xk.xmls.vip

server {
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name xk.xmls.vip;
    
    # 前端静态文件根目录
    root /www/wwwroot/course-selection/frontend;
    index index.html index.htm;
    
    # CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/xk.xmls.vip.conf;
    # CERT-APPLY-CHECK--END
    
    # SSL 相关配置
    ssl_certificate    /www/server/panel/vhost/cert/xk.xmls.vip/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/xk.xmls.vip/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;
    
    # HTTP 强制跳转 HTTPS
    if ($server_port != 443) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    
    # 后端接口代理（优先级最高，放在最前面）
    location /prod-api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 对应 ruoyi-admin 服务的本地端口
        proxy_pass http://127.0.0.1:8080/;
        
        # 超时设置
        proxy_connect_timeout 600;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        
        # 允许大文件上传（如导入 Excel）
        client_max_body_size 50m;
    }
    
    # 前端路由支持（防止刷新 404）
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$ {
        return 404;
    }
    
    # 日志配置
    access_log  /www/wwwlogs/xk.xmls.vip.log;
    error_log  /www/wwwlogs/xk.xmls.vip.error.log;
    
    # 注意：如果日志目录不存在，请先创建：
    # mkdir -p /www/wwwlogs
    # 或者使用宝塔面板默认的日志路径
}
