version: '3.8'

# 服务器部署配置 - 使用已有的 PostgreSQL 和 Redis
# 适用于已安装 Docker PostgreSQL 和 Redis 的 CentOS 7 服务器

services:
  # 后端服务
  backend:
    image: course-selection-backend:latest
    container_name: course-selection-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
      # 数据库配置（连接宿主机的 PostgreSQL）
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/school-course
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=mm5621528
      # Redis 配置（连接宿主机的 Redis）
      - SPRING_REDIS_HOST=host.docker.internal
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=
    volumes:
      - ./logs:/app/logs
      - ./upload:/app/upload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - course-network

  # 前端服务 (Nginx)
  frontend:
    image: nginx:alpine
    container_name: course-selection-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - course-network

networks:
  course-network:
    driver: bridge
