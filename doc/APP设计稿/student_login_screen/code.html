<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Login Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
<!-- Mobile Container -->
<div class="w-full max-w-md h-screen max-h-[900px] bg-white dark:bg-[#1a2632] shadow-2xl overflow-hidden relative flex flex-col md:rounded-3xl md:h-[850px] md:border md:border-slate-200 dark:md:border-slate-700">
<!-- Status Bar Placeholder (iOS style) -->
<div class="h-12 w-full bg-white dark:bg-[#1a2632] flex items-end px-6 pb-2 justify-between shrink-0 z-10">
<span class="text-xs font-medium text-slate-900 dark:text-slate-100">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]" style="font-size: 18px;">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]" style="font-size: 18px;">wifi</span>
<span class="material-symbols-outlined text-[18px]" style="font-size: 18px;">battery_full</span>
</div>
</div>
<!-- Header -->
<div class="flex items-center justify-between px-4 py-2 bg-white dark:bg-[#1a2632]">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100">Student Login</h2>
<div class="w-10"></div> <!-- Spacer for visual balance -->
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto px-6 pt-4 pb-8 flex flex-col">
<!-- Logo Section -->
<div class="flex flex-col items-center justify-center mt-6 mb-10">
<div class="relative w-28 h-28 mb-6 rounded-2xl overflow-hidden bg-primary/10 flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-primary text-6xl">school</span>
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent"></div>
</div>
<h1 class="text-2xl font-bold text-center text-slate-900 dark:text-slate-100 mb-2">University Course Selection</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm">Welcome back! Please login to your account to manage your schedule.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5 w-full">
<!-- Student ID -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Student ID</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl pointer-events-none">badge</span>
<input class="form-input w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary pl-11 pr-4 py-3.5 transition-all text-base" placeholder="Enter your Student ID" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl pointer-events-none">lock</span>
<input class="form-input w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary pl-11 pr-12 py-3.5 transition-all text-base" placeholder="Enter your password" type="password"/>
<button class="absolute right-0 top-0 bottom-0 px-4 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center cursor-pointer gap-3 group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-slate-600 shadow-sm transition-all checked:border-primary checked:bg-primary hover:border-primary focus:ring-2 focus:ring-primary/20" type="checkbox"/>
<span class="pointer-events-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white opacity-0 peer-checked:opacity-100">
<svg class="h-3.5 w-3.5" fill="currentColor" stroke="currentColor" stroke-width="1" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</span>
</div>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300 group-hover:text-slate-800 dark:group-hover:text-slate-100 transition-colors">Remember me</span>
</label>
<!-- Face ID Placeholder (iOS Touch) -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">face</span>
</button>
</div>
<!-- Login Button -->
<button class="mt-4 w-full bg-primary hover:bg-blue-600 active:scale-[0.98] text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 group" type="button">
<span>Log In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-auto pt-8 flex flex-col items-center gap-6">
<div class="relative w-full flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<span class="relative bg-white dark:bg-[#1a2632] px-4 text-xs font-medium text-slate-400 uppercase tracking-wider">Or</span>
</div>
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:underline" href="#">Contact Admin</a>
</p>
</div>
</div>
<!-- Bottom Indicator (iOS style) -->
<div class="h-6 w-full bg-white dark:bg-[#1a2632] flex items-center justify-center shrink-0">
<div class="h-1 w-32 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
</div>
</body></html>
