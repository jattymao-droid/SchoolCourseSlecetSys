<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Course Submission Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex items-center justify-center min-h-screen p-0 md:p-4">
<!-- Mobile Overlay/Modal Container -->
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-none md:rounded-3xl overflow-hidden flex flex-col h-screen md:h-auto md:max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between p-4 pb-2 bg-white dark:bg-slate-900 sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Success</h2>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto">
<div class="flex flex-col px-6 py-6 items-center">
<!-- Success Icon -->
<div class="flex flex-col items-center gap-6 mb-8">
<div class="size-24 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-green-600 dark:text-green-400 text-6xl">check_circle</span>
</div>
<div class="flex flex-col items-center gap-2 text-center">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-[-0.015em]">Selection Submitted!</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal max-w-[280px]">Your mandatory courses for the upcoming week have been successfully registered.</p>
</div>
</div>
<!-- Course List Card -->
<div class="w-full bg-background-light dark:bg-slate-800 rounded-xl p-4 space-y-4">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider mb-2 opacity-70">Weekly Schedule</h3>
<div class="grid grid-cols-[80px_1fr] items-center gap-x-4 gap-y-4">
<!-- Monday -->
<div class="flex items-center">
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">M</div>
<span class="ml-3 text-slate-500 dark:text-slate-400 text-sm font-medium">Mon</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium text-right">Calculus I</p>
<div class="col-span-2 border-b border-slate-200 dark:border-slate-700"></div>
<!-- Tuesday -->
<div class="flex items-center">
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">T</div>
<span class="ml-3 text-slate-500 dark:text-slate-400 text-sm font-medium">Tue</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium text-right">Physics Lab</p>
<div class="col-span-2 border-b border-slate-200 dark:border-slate-700"></div>
<!-- Wednesday -->
<div class="flex items-center">
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">W</div>
<span class="ml-3 text-slate-500 dark:text-slate-400 text-sm font-medium">Wed</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium text-right">Intro to Psychology</p>
<div class="col-span-2 border-b border-slate-200 dark:border-slate-700"></div>
<!-- Thursday -->
<div class="flex items-center">
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">T</div>
<span class="ml-3 text-slate-500 dark:text-slate-400 text-sm font-medium">Thu</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium text-right">World History</p>
<div class="col-span-2 border-b border-slate-200 dark:border-slate-700"></div>
<!-- Friday -->
<div class="flex items-center">
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">F</div>
<span class="ml-3 text-slate-500 dark:text-slate-400 text-sm font-medium">Fri</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium text-right">Computer Science 101</p>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 space-y-3 pb-8 md:pb-4">
<button class="w-full flex cursor-pointer items-center justify-center rounded-xl h-12 px-5 bg-primary hover:bg-blue-600 text-white text-base font-bold leading-normal tracking-[0.015em] transition-colors shadow-lg shadow-primary/30">
<span class="mr-2 material-symbols-outlined text-[20px]">calendar_month</span>
                View My Schedule
            </button>
<button class="w-full flex cursor-pointer items-center justify-center rounded-xl h-12 px-5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 text-base font-bold leading-normal tracking-[0.015em] transition-colors">
                Back to Home
            </button>
</div>
</div>
</body></html>
