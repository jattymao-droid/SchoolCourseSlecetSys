# 东陆高中选课系统 - Docker Compose
# 适用: 云服务器已有 PostgreSQL、Redis（宝塔安装）
# 域名: xk.xmls.vip

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: xk-backend:latest
    container_name: xk-backend
    environment:
      # 连接宿主机 PostgreSQL、Redis（Linux 需添加 host.docker.internal）
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ry_vue}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-mm5621528}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - upload_data:/app/uploadPath
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: xk-frontend:latest
    container_name: xk-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"   # 若 80 被宝塔占用，可设 FRONTEND_PORT=81
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  upload_data:
