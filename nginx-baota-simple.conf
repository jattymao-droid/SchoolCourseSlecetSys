# 宝塔面板 - 学校选课系统 Nginx 配置（简化版）
# 使用方法：在宝塔面板中，网站设置 -> 配置文件，替换为此内容

server {
    listen 80;
    listen 443 ssl http2;
    server_name xk.xmls.vip;
    
    # 前端静态文件根目录
    root /www/wwwroot/course-selection/frontend;
    index index.html;
    
    # SSL证书配置（如果已配置SSL）
    ssl_certificate    /www/server/panel/vhost/cert/xk.xmls.vip/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/xk.xmls.vip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HTTP跳转HTTPS（如果启用了SSL）
    if ($server_port = 80) {
        return 301 https://$host$request_uri;
    }
    
    # 后端API代理
    location /prod-api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 600;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        
        # 文件上传大小限制
        client_max_body_size 50m;
    }
    
    # 前端路由支持（SPA应用）
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 日志配置（使用宝塔默认路径）
    access_log /www/wwwlogs/xk.xmls.vip.log;
    error_log /www/wwwlogs/xk.xmls.vip.error.log;
}
